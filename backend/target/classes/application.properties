spring.application.name=mentor-connect-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/mentor_connect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YourNewPassword123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
mentorconnect.app.jwtSecret=mentorConnectSecretKeyForJWTSecurityPurposeMustBeLongEnough1234567890
mentorconnect.app.jwtExpirationMs=86400000

# Server Configuration
server.port=8080

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
