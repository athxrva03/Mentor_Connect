<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | MentorBridge</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-theme="dark" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; position: relative;">
    <button class="theme-toggle" onclick="toggleTheme()" style="position: absolute; top: 2rem; right: 2rem;"><i class="fas fa-moon" id="theme-icon"></i></button>
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div class="logo-container" style="justify-content: center; margin-bottom: 1rem;">
                <i class="fas fa-graduation-cap"></i> <span>MentorBridge</span>
            </div>
            <h1 style="font-size: 1.75rem; font-weight: 700;">Join the Institutional Portal</h1>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Access restricted to valid College IDs</p>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label>College ID / Organization ID</label>
                <input type="text" id="collegeId" class="form-control" placeholder="e.g. 2024-CSE-001" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@college.edu" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Select Role</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                    <label style="border: 1px solid var(--border); padding: 1rem; border-radius: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 0.75rem;">
                        <input type="radio" name="role" value="MENTEE" checked> Mentee
                    </label>
                    <label style="border: 1px solid var(--border); padding: 1rem; border-radius: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 0.75rem;">
                        <input type="radio" name="role" value="MENTOR"> Mentor
                    </label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Login here</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-icon').className = savedTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            icon.className = newTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', newTheme);
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            const payload = {
                name: document.getElementById('name').value,
                collegeId: document.getElementById('collegeId').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.querySelector('input[name="role"]:checked').value
            };

            try {
                const message = await apiRequest('/register', 'POST', payload);
                showToast('Registration Successful!');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (error) {
                showToast(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register';
            }
        });
    </script>
</body>
</html>
